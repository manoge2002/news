<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrafficLine ModerationsAssistent</title>
    <!-- Lade TailwindCSS direkt via CDN, damit kein npm benötigt wird -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Lade Lucide Icons via CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="flex flex-col h-screen bg-slate-100 font-sans text-slate-900 overflow-hidden selection:bg-indigo-300">
    <main class="flex flex-1 overflow-hidden">
      <!-- Hauptbereich -->
      <section class="flex flex-col flex-1 h-full min-w-0 p-8">
        <div id="main-card" class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden flex flex-col flex-1 transition-colors duration-300">
          
          <!-- Nachrichtenanzeige -->
          <div id="message-container" class="p-12 flex-1 flex flex-col items-center justify-center text-center">
            <div class="text-xl text-slate-500 font-medium">Lade Verkehrsmeldungen...</div>
          </div>

          <!-- Banner mit Uhrzeit und Fortschrittsanzeige (unten) -->
          <div class="bg-slate-50 p-8 border-t border-slate-100 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-8">
              <div id="clock" class="text-4xl font-bold text-slate-800 tabular-nums"></div>
              <div id="counter" class="text-2xl font-bold text-slate-400 uppercase tracking-widest">
                0 / 0 Nachrichten
              </div>
              <button id="btn-refresh" class="hidden ml-4 px-6 py-2 bg-indigo-600 text-white text-xl font-bold rounded-lg shadow hover:bg-indigo-700 transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer flex items-center gap-2">
                <i data-lucide="refresh-cw" class="w-6 h-6"></i> Neue Meldungen
              </button>
            </div>
            <div class="h-4 w-96 bg-slate-200 rounded-full overflow-hidden flex">
              <div id="progress-bar" class="h-full bg-indigo-600 transition-all duration-300" style="width: 0%"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      // Initialisiere Icons
      lucide.createIcons();

      let messages = [];
      let pendingMessages = [];
      let currentIndex = 0;

      // Uhrzeit-Setup
      const clockEl = document.getElementById('clock');
      setInterval(() => {
        clockEl.textContent = new Date().toLocaleTimeString('de-DE');
      }, 1000);
      clockEl.textContent = new Date().toLocaleTimeString('de-DE');

      async function fetchTrafficData() {
        const roads = ["A60", "A63", "A66", "A643", "A671", "B40", "B43"];
        const warnings = [];
        
        for (const road of roads) {
          try {
            const response = await fetch(`https://verkehr.autobahn.de/o/autobahn/${road}/services/warning`, { cache: "no-store" });
            const data = await response.json();
            if (data.warning) {
              warnings.push(...data.warning);
            }
          } catch (e) {
            console.error('Fehler beim Abrufen von', road, e);
          }
        }

        function formatText(t) {
          if (!t) return "";
          return t
            .replace(/Frankfurt am Main/g, "Frankfurt")
            .replace(/\bAS\b/g, "Anschlussstelle")
            .replace(/\bAK\b/g, "Autobahnkreuz")
            .replace(/\bAD\b/g, "Autobahndreieck")
            .replace(/\d+(?:\.\d+)?\s*km\s+(?:hinter|vor)\s+/g, "")
            .replace(/->/g, "→")
            .replace(/\s+-\s+/g, " → ");
        }

        const msgs = warnings.map(w => {
          const road = w.title.split('|')[0].trim();
          const segment = w.title.split('|')[1]?.trim() || w.subtitle?.trim();
          
          let section = w.description.find(d => d.startsWith(`${road}:`));
          if (section) {
             section = section.split(',').slice(1).join(',').trim();
          } else {
             section = w.subtitle?.trim() || "";
          }
          
          const eventsLines = [];
          let inEvents = false;
          for (const line of w.description) {
             if (line === "Ereignismeldung:") {
                inEvents = true;
                continue;
             }
             if (inEvents && line.startsWith("-")) {
                eventsLines.push(line.substring(1).trim());
             }
          }
          const events = eventsLines.join(' • ') || w.description[2] || "Verkehrsbehinderung";
      
          return {
             id: w.identifier,
             text: {
               road: road,
               segment: formatText(segment),
               section: formatText(section),
               events: formatText(events)
             },
             pubStr: "seit " + new Date(w.startTimestamp).toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'}) + " Uhr"
          };
        });

        // Filter für das gewünschte Gebiet
        const keywords = ["bingen", "rüsselsheim", "nieder-olm", "mainz", "wiesbaden", "frauenstein", "eschborn", "frankfurt", "griesheim", "kelsterbach", "hofheim", "diedenbergen", "schierstein", "wallau", "mönchhof", "raunheim", "darmstadt"];
        
        let filtered = msgs.filter((m) => {
          const road = m.text?.road?.toLowerCase() || "";
          const segment = m.text?.segment?.toLowerCase() || "";
          const section = m.text?.section?.toLowerCase() || "";
          const events = m.text?.events?.toLowerCase() || "";
          const combinedText = `${road} ${segment} ${section} ${events}`;
          return keywords.some(k => combinedText.includes(k));
        });

        if (filtered.length === 0 && msgs.length > 0) {
          filtered = msgs;
        }
        
        return filtered;
      }

      // Initiale Verkehrsmeldungen abrufen
      async function fetchTrafficInitial() {
        const container = document.getElementById('message-container');
        container.innerHTML = '<div class="text-xl text-slate-500 font-medium">Lade Verkehrsmeldungen...</div>';
        
        messages = await fetchTrafficData();
        currentIndex = 0;
        updateUI();
      }

      // Background Check für neue Meldungen
      async function fetchTrafficBackground() {
        const newMessages = await fetchTrafficData();
        
        // Vergleichen anhand der IDs
        const currentIds = messages.map(m => m.id).sort().join(',');
        const newIds = newMessages.map(m => m.id).sort().join(',');
        
        if (currentIds !== newIds) {
          pendingMessages = newMessages;
          // Wenn der Fortschrittsbalken bei 100% ist (Ende der Meldungen),
          // können wir sofort updaten.
          if (messages.length > 0 && currentIndex === messages.length) {
            messages = pendingMessages;
            currentIndex = 0;
            document.getElementById('btn-refresh').classList.add('hidden');
            updateUI();
          } else if (messages.length === 0) {
            messages = pendingMessages;
            currentIndex = 0;
            document.getElementById('btn-refresh').classList.add('hidden');
            updateUI();
          } else {
            document.getElementById('btn-refresh').classList.remove('hidden');
          }
        }
      }

      function updateUI() {
        const container = document.getElementById('message-container');
        const mainCard = document.getElementById('main-card');
        const counter = document.getElementById('counter');
        const progressBar = document.getElementById('progress-bar');

        if (messages.length === 0) {
          container.innerHTML = '<div class="text-2xl font-bold text-slate-400">Keine aktuellen Meldungen für Mainz/Wiesbaden.</div>';
          counter.textContent = '0 / 0 Nachrichten';
          progressBar.style.width = '0%';
          if (mainCard) mainCard.className = "bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden flex flex-col flex-1 transition-colors duration-300";
          return;
        }

        if (currentIndex === messages.length) {
          if (mainCard) {
            mainCard.className = `bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden flex flex-col flex-1 transition-colors duration-300`;
          }
          container.innerHTML = `
            <div class="flex flex-col items-center justify-center gap-8">
              <i data-lucide="check-circle-2" class="text-indigo-400" style="width: 120px; height: 120px;"></i>
              <h2 class="text-6xl font-black tracking-tighter text-slate-800 text-center">
                Ende der Meldungen
              </h2>
              <p class="text-4xl text-slate-500 font-medium">Alle aktuellen Verkehrsinformationen gelesen.</p>
            </div>
          `;
          lucide.createIcons();
          counter.textContent = `${messages.length} / ${messages.length} Nachrichten`;
          progressBar.style.width = `100%`;
          return;
        }

        const msg = messages[currentIndex];
        
        // Farbe bestimmen (default: gelb für normale Meldung)
        const textToSearch = ((msg.text.events || '') + ' ' + (msg.text.segment || '') + ' ' + (msg.text.section || '')).toLowerCase();
        let bgClass = 'bg-amber-100';
        let textClass = 'text-amber-950';
        let badgeBgClass = 'bg-amber-200';
        let badgeTextClass = 'text-amber-800';
        let borderClass = 'border-amber-300';

        if (textToSearch.includes('person') || textToSearch.includes('geisterfahrer') || textToSearch.includes('falschfahrer') || textToSearch.includes('fußgänger') || textToSearch.includes('entgegenkommend')) {
           bgClass = 'bg-red-100';
           textClass = 'text-red-950';
           badgeBgClass = 'bg-red-200';
           badgeTextClass = 'text-red-800';
           borderClass = 'border-red-300';
        } else if (textToSearch.includes('aufgehoben') || textToSearch.includes('frei')) {
           bgClass = 'bg-emerald-100';
           textClass = 'text-emerald-950';
           badgeBgClass = 'bg-emerald-200';
           badgeTextClass = 'text-emerald-800';
           borderClass = 'border-emerald-300';
        }

        if (mainCard) {
           mainCard.className = `${bgClass} rounded-2xl shadow-xl border ${borderClass} overflow-hidden flex flex-col flex-1 transition-colors duration-300`;
        }

        const formattedSegment = msg.text.segment || '';

        container.innerHTML = `
          <div class="inline-block px-10 py-2 ${badgeBgClass} ${badgeTextClass} text-4xl font-black rounded-full mb-6 uppercase tracking-wider shadow-sm">
            ${msg.text.road || 'Traffic Alert'}
          </div>
          <h2 class="text-6xl font-black tracking-tighter ${textClass} mb-6">${formattedSegment}</h2>
          <p class="text-5xl ${textClass} font-light max-w-[1200px] leading-tight opacity-90">
            <span class="font-bold">${msg.text.section || ''}</span>
          </p>
          <p class="text-4xl ${textClass} font-medium max-w-[1200px] mt-6 leading-tight">
            ${msg.text.events || ''}
          </p>
          ${msg.pubStr ? `<p class="text-2xl ${textClass} font-bold mt-10 uppercase tracking-widest opacity-60">${msg.pubStr}</p>` : ''}
        `;
        
        // Neu laden der Icons nach DOM Update
        lucide.createIcons();

        const displayIndex = currentIndex;
        counter.textContent = `${displayIndex} / ${messages.length} Nachrichten`;
        progressBar.style.width = messages.length > 0 ? `${(displayIndex / messages.length) * 100}%` : '0%';
      }

      // Funktion zum manuellen Aktualisieren
      function doRefresh() {
        if (!document.getElementById('btn-refresh').classList.contains('hidden')) {
          messages = pendingMessages;
          currentIndex = 0;
          document.getElementById('btn-refresh').classList.add('hidden');
          updateUI();
        } else {
          fetchTrafficInitial();
        }
      }

      // Event Listener (Buttons)
      document.getElementById('btn-refresh').addEventListener('click', doRefresh);

      // Event Listener (Tastatur)
      window.addEventListener('keydown', (e) => {
        // Alt + Ctrl + Shift + Y -> Nächste Karte
        if (e.altKey && e.ctrlKey && e.shiftKey && e.code === 'KeyY') {
          if (currentIndex < messages.length) { currentIndex++; updateUI(); }
          return;
        }
        // Ctrl + Shift + Y -> Vorherige Karte
        if (!e.altKey && e.ctrlKey && e.shiftKey && e.code === 'KeyY') {
          if (currentIndex > 0) { currentIndex--; updateUI(); }
          return;
        }
        // Alt + Shift + Y -> Aktualisieren
        if (e.altKey && !e.ctrlKey && e.shiftKey && e.code === 'KeyY') {
          doRefresh();
          return;
        }

        // Normale Navigation (ohne Modifier)
        if (!e.ctrlKey && !e.altKey && !e.metaKey) {
          if (e.key === 'ArrowDown') {
            if (currentIndex < messages.length) { currentIndex++; updateUI(); }
          } else if (e.key === 'ArrowUp') {
            if (currentIndex > 0) { currentIndex--; updateUI(); }
          } else if (e.key.toLowerCase() === 'r') {
            doRefresh();
          }
        }
      });

      // Erster Start
      fetchTrafficInitial();

      // Automatischer Background-Check jede Minute
      setInterval(fetchTrafficBackground, 60000);
    </script>
  </body>
</html>
